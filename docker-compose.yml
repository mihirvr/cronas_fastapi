services:
  postgres:
    image: postgres:16
    container_name: cronas-fastapi-postgres
    environment:
      POSTGRES_DB: cronas
      POSTGRES_USER: cronas
      POSTGRES_PASSWORD: cronas
    ports:
      - "5435:5432"
    volumes:
      - cronas_fastapi_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cronas-fastapi-redis
    ports:
      - "6381:6379"

  kafka:
    image: apache/kafka:3.7.0
    container_name: cronas-fastapi-kafka
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  cronas_fastapi_postgres_data:
